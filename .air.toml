# Air - Go 热重载配置文件
# 文档：https://github.com/cosmtrek/air

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # 要编译的主文件
  cmd = "go build -o ./tmp/main.exe ./cmd/main.go"

  # 编译后运行的二进制文件
  bin = "./tmp/main.exe"

  # 要监听的文件后缀
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]

  # 要排除的目录
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", "docs"]

  # 要排除的文件
  exclude_file = []

  # 排除不需要监听的文件（正则）
  exclude_regex = ["_test.go"]

  # 排除不需要监听的文件（精确匹配）
  exclude_unchanged = true

  # 监听当前目录下的子目录
  include_dir = []

  # 同时监听的文件或目录
  include_file = []

  # 延迟触发编译（毫秒），避免频繁编译
  delay = 1000

  # 发生错误时停止运行
  stop_on_error = true

  # 发送中断信号前的延迟（毫秒）
  kill_delay = 500

  # 构建日志
  log = "build-errors.log"

  # 轮询监听（某些系统不支持 fsnotify）
  poll = false

  # 轮询间隔（毫秒）
  poll_interval = 500

[log]
  # 显示日志时间
  time = true

  # 只显示主日志
  main_only = false

[color]
  # 自定义颜色
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # 退出时清理临时目录
  clean_on_exit = true

[screen]
  # 保持滚动
  clear_on_rebuild = true
